<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDARIUM SOVEREIGN</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Tenor+Sans&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #1a2a3a;
      --navy-deep: #0d1a26;
      --gold: #b8975a;
      --cream: #f2efe8;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tenor Sans', sans-serif;
      background: var(--cream);
    }

    /* ================= HEADER PREMIUM ================= */

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 1.2rem 3rem;

      background: rgba(242,239,232,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(184,151,90,0.2);
    }

    nav::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    /* LOGO */

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      text-decoration: none;
    }

    .nav-logo img {
      width: 48px;
      height: 48px;
      min-width: 48px;
      object-fit: contain;
      display: block;

      transition: transform 0.3s ease;
    }

    .nav-logo:hover img {
      transform: scale(1.05);
    }

    .nav-brand {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .nav-brand-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy);
    }

    .nav-brand-sub {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 3px;
    }

    /* NAV LINKS */

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--navy);
      opacity: 0.6;
      position: relative;
      transition: all 0.25s ease;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0%;
      height: 1px;
      background: var(--gold);
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* HERO (simple pour test) */

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--navy-deep);
      color: white;
      text-align: center;
      padding-top: 80px;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      letter-spacing: 0.1em;
    }

    /* RESPONSIVE */

    @media (max-width: 900px) {
      nav {
        padding: 1rem 1.5rem;
      }

      .nav-links {
        display: none;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <nav>
    <a href="#" class="nav-logo">
      <img src="./assets/logo.png" alt="Idarium Logo" width="48" height="48">
      
      <div class="nav-brand">
        <span class="nav-brand-main">Idarium</span>
        <span class="nav-brand-sub">Sovereign</span>
      </div>
    </a>

    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Mission</a></li>
      <li><a href="#">Structure</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>IDARIUM</h1>
  </section>

</body>
</html>
